server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # This nginx's mime.types lacks .mjs (the pdfjs worker); module scripts
    # must be served as JavaScript or the browser refuses to load them.
    # A bare types block replaces the inherited map, so re-include it first.
    include /etc/nginx/mime.types;
    types {
        text/javascript mjs;
    }

    # SPA fallback — client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite assets are content-hashed, safe to cache forever;
    # index.html stays uncached so deploys take effect immediately.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
